html{scroll-behavior:smooth;-webkit-text-size-adjust:100%}
body{font-family:var(--font-body);background:var(--navy);color:#fff;overflow-x:hidden}
.container{width:100%;max-width:1140px;margin:0 auto;padding:0 24px}
.reveal{opacity:0;transform:translateY(28px);transition:opacity .7s ease,transform .7s ease}
.reveal.visible{opacity:1;transform:translateY(0)}
@media(prefers-reduced-motion:reduce){*,*::before,*::after{animation-duration:.01ms!important;transition-duration:.01ms!important}.reveal{opacity:1;transform:none}}
:focus-visible{outline:2px solid var(--gold);outline-offset:3px;border-radius:3px}

.nav-logo{display:inline-flex;align-items:center;gap:8px;font-family:var(--font-display);font-size:1.4rem;font-weight:800;letter-spacing:.08em;color:#fff;text-decoration:none;text-transform:uppercase}
.nav-logo span{color:var(--gold)}
.btn-primary{display:inline-flex;align-items:center;gap:8px;background:var(--gold);color:var(--navy);font-family:var(--font-display);font-size:1rem;font-weight:800;letter-spacing:.06em;text-transform:uppercase;padding:16px 32px;border-radius:var(--radius);text-decoration:none;transition:background var(--transition),transform .2s;min-height:52px}
.btn-primary:hover{background:var(--gold-dark);transform:translateY(-2px)}
.btn-outline{display:inline-flex;align-items:center;gap:8px;background:transparent;color:var(--white);font-family:var(--font-display);font-size:1rem;font-weight:700;letter-spacing:.06em;text-transform:uppercase;padding:15px 32px;border:2px solid rgba(255,255,255,.5);border-radius:var(--radius);text-decoration:none;transition:border-color var(--transition),color var(--transition);min-height:52px}
.btn-outline:hover{border-color:var(--gold);color:var(--gold)}
.section-label{font-family:var(--font-display);font-size:.8rem;font-weight:800;letter-spacing:.15em;text-transform:uppercase;color:var(--gold-dark);margin-bottom:12px;display:block}
.section-label.light{color:var(--gold)}
